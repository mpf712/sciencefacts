<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Fact Generator</title>
    <!-- Importing a futuristic Space font from Google -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            /* Deep space background image from Unsplash */
            background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2048&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff;
        }
        
        /* Glassmorphism Container */
        .container {
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 243, 255, 0.1);
            max-width: 550px;
            width: 90%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle glowing top border inside the container */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f3ff, transparent);
        }

        .category {
            text-transform: uppercase;
            font-size: 0.9rem;
            color: #00f3ff;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
        }

        .fact-text {
            font-size: 1.4rem;
            color: #e2e8f0;
            margin-bottom: 2rem;
            line-height: 1.6;
            min-height: 80px; /* Prevents button from jumping too much */
        }

        /* Animation Class */
        .animate-fact {
            animation: slideUpFade 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        
        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }


        /* Neon Button */
        button {
            background-color: transparent;
            color: #00f3ff;
            border: 2px solid #00f3ff;
            padding: 12px 28px;
            font-size: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        button:hover {
            background-color: #00f3ff;
            color: #050b14;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6), inset 0 0 15px rgba(0, 243, 255, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="category" id="category">Establishing Link...</div>
        <div class="fact-text" id="fact">Scanning database for anomalies...</div>
        <button onclick="displayRandomFact()">Initialize New Fact</button>
    </div>

    <script>
        let factsArray = [];

        async function loadFacts() {
            try {
                const response = await fetch('facts.csv');
                const data = await response.text();
                
                const rows = data.split('\n').filter(row => row.trim() !== '');
                
                factsArray = rows.slice(1).map(row => {
                    const [category, ...factParts] = row.split(',');
                    return {
                        category: category.trim(),
                        fact: factParts.join(',').trim()
                    };
                });

                displayRandomFact();
            } catch (error) {
                document.getElementById('fact').innerText = "Connection lost. Please ensure you are running a local server.";
                console.error("Error loading CSV:", error);
            }
        }

        function displayRandomFact() {
            if (factsArray.length === 0) return;
            
            const randomIndex = Math.floor(Math.random() * factsArray.length);
            const randomFact = factsArray[randomIndex];
            
            const factEl = document.getElementById('fact');
            const categoryEl = document.getElementById('category');
            
            // 1. Remove the animation class to reset it
            factEl.classList.remove('animate-fact');
            categoryEl.classList.remove('animate-fact');
            
            // 2. Force the browser to reflow (this restarts the animation)
            void factEl.offsetWidth; 
            
            // 3. Update the text with the new fact
            categoryEl.innerText = randomFact.category;
            factEl.innerText = randomFact.fact;
            
            // 4. Re-add the animation class to trigger the visual effect
            factEl.classList.add('animate-fact');
            categoryEl.classList.add('animate-fact');
        }


        window.onload = loadFacts;
    </script>
</body>
</html>
